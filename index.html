<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedTerm Easy Explainer</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
    h2 { color: #0056b3; }
    input, textarea, button { width: 100%; margin-top: 10px; padding: 10px; box-sizing: border-box; }
    button { background-color: #0056b3; color: white; border: none; font-weight: bold; cursor: pointer; }
    button:hover { background-color: #003d80; }
    #result { margin-top: 20px; padding: 15px; background: #f9f9f9; border-left: 4px solid #0056b3; min-height: 50px; }
  </style>
</head>
<body>

  <h2>🩺 MedTerm Easy Explainer</h2>
  <p>Paste your Gemini API key and type a medical term/report to explain simply.</p>

  <label for="apiKey"><strong>Gemini API Key:</strong></label>
  <input type="password" id="apiKey" placeholder="Paste your AIzaSy... API Key here">

  <label for="userInput"><strong>Medical Term / Report Text:</strong></label>
  <textarea id="userInput" rows="4" placeholder="e.g., Hyperkalemia or Hemoglobin 11.5 g/dL"></textarea>

  <button onclick="explainTerm()">Explain Simply</button>

  <div id="result">Your simplified explanation will appear here...</div>

  <script>
    async function explainTerm() {
      const apiKey = document.getElementById('apiKey').value.trim();
      const text = document.getElementById('userInput').value.trim();
      const resultDiv = document.getElementById('result');

      if (!apiKey) {
        alert('Please enter your Gemini API Key!');
        return;
      }
      if (!text) {
        alert('Please enter a medical term or lab report text!');
        return;
      }

      resultDiv.innerText = 'Analyzing with Gemini AI... Please wait...';

      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{
              parts: [{
                text: `You are a helpful medical assistant. Explain the following medical term or lab result in extremely simple, easy-to-understand language for a patient: "${text}"`
              }]
            }]
          })
        });

        const data = await response.json();

        if (data.candidates && data.candidates[0].content.parts[0].text) {
          resultDiv.innerText = data.candidates[0].content.parts[0].text;
        } else {
          resultDiv.innerText = 'Error processing request. Please check your API key.';
        }
      } catch (error) {
        resultDiv.innerText = 'Network error or invalid API key request.';
      }
    }
  </script>

</body>
</html>
