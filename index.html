<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedTerm Easy Explainer</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        textarea { width: 100%; height: 80px; padding: 10px; margin-bottom: 10px; }
        input[type="password"] { width: 100%; padding: 10px; margin-bottom: 10px; }
        button { background-color: #0284c7; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #0369a1; }
        #output { margin-top: 20px; padding: 15px; background-color: #f0f9ff; border-left: 4px solid #0284c7; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>🩺 MedTerm Easy Explainer</h2>
    <p>Enter any complex medical term or lab result to get a simple, easy explanation.</p>

    <label><b>Gemini API Key:</b></label>
    <input type="password" id="apiKey" placeholder="Enter your Gemini API Key here...">

    <label><b>Medical Term or Report Text:</b></label>
    <textarea id="userInput" placeholder="e.g., Hyperkalemia or Metabolic Acidosis..."></textarea>

    <button onclick="explainTerm()">Explain Simply</button>

    <div id="output">Your simple explanation will appear here...</div>

    <script>
        async function explainTerm() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const userInput = document.getElementById('userInput').value.trim();
            const outputDiv = document.getElementById('output');

            if (!apiKey) {
                alert("Please enter your Gemini API key!");
                return;
            }
            if (!userInput) {
                alert("Please enter a medical term!");
                return;
            }

            outputDiv.innerText = "Analyzing term...";

            const systemPrompt = "You are an expert medical teacher explaining terms to beginners. Explain the given medical term or lab result in 3 extremely short, clear, bullet points using plain language.";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: systemPrompt },
                                { text: `Explain this medical term simple and short: ${userInput}` }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    outputDiv.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    outputDiv.innerText = "Error processing request. Please check your API key.";
                }
            } catch (error) {
                outputDiv.innerText = "Error connecting to AI service.";
            }
        }
    </script>
</body>
</html>
